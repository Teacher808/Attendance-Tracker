<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack Portal</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Note: We use data-type="module" so we can import React and Icons directly from CDNs -->
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      School, Users, CalendarDays, BarChart4, LogOut, 
      CheckCircle2, XCircle, ChevronLeft, Save, AlertCircle, 
      FileSpreadsheet, Plus, UserPlus, ListPlus, Check, Copy
    } from 'https://esm.sh/lucide-react@0.292.0';

    // --- MOCK INITIAL DATA ---
    // Note: When integrating with your Google Sheet, you will replace these 
    // with calls like `google.script.run.withSuccessHandler(...).getClasses()`
    const INITIAL_USERS = [
      { id: 'u1', username: 'teacher', password: 'password', name: 'Mr. Dela Cruz' }
    ];

    const INITIAL_CLASSES = [
      {
        id: 'c1',
        teacherId: 'u1',
        name: 'Grade 10 - Rizal',
        subject: 'Mathematics',
        schoolYear: '2025-2026',
        students: [
          { id: 's1', name: 'Alcantara, Joshua', gender: 'Male' },
          { id: 's2', name: 'Bautista, Mark', gender: 'Male' },
          { id: 's3', name: 'Dela Torre, Anna', gender: 'Female' },
          { id: 's4', name: 'Espiritu, Maria', gender: 'Female' },
        ],
        attendance: {
          '2026-03-02': { s1: 'Present', s2: 'Absent', s3: 'Present', s4: 'Present' },
          '2026-03-03': { s1: 'Present', s2: 'Present', s3: 'Present', s4: 'Absent' }
        }
      }
    ];

    function App() {
      // Global App State
      const [users, setUsers] = useState(INITIAL_USERS);
      const [currentUser, setCurrentUser] = useState(null);
      const [classes, setClasses] = useState(INITIAL_CLASSES);
      
      // Navigation & View State
      const [authMode, setAuthMode] = useState('login');
      const [view, setView] = useState('dashboard');
      const [activeClassId, setActiveClassId] = useState(null);
      const [activeTab, setActiveTab] = useState('record');

      // --- AUTHENTICATION LOGIC ---
      const handleLogin = (e) => {
        e.preventDefault();
        const username = e.target.username.value;
        const password = e.target.password.value;
        
        const foundUser = users.find(u => u.username === username && u.password === password);
        if (foundUser) {
          setCurrentUser(foundUser);
          setView('dashboard');
        } else {
          alert("Invalid username or password. Please try again.");
        }
      };

      const handleSignup = (e) => {
        e.preventDefault();
        const name = e.target.name.value;
        const username = e.target.username.value;
        const password = e.target.password.value;

        if (users.find(u => u.username === username)) {
          alert("This username is already taken. Choose another one.");
          return;
        }

        const newUser = {
          id: 'u' + Date.now(),
          name,
          username,
          password
        };

        setUsers([...users, newUser]);
        setCurrentUser(newUser); // Auto-login after signup
        setView('dashboard');
      };

      const handleLogout = () => {
        setCurrentUser(null);
        setActiveClassId(null);
        setView('dashboard');
      };

      // --- RENDERING ---

      if (!currentUser) {
        return (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
            <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
              <div className="flex flex-col items-center mb-8">
                <div className="bg-blue-600 p-3 rounded-full mb-4">
                  <School className="w-8 h-8 text-white" />
                </div>
                <h1 className="text-2xl font-bold text-slate-800">EduTrack Portal</h1>
                <p className="text-slate-500 text-sm mt-1">Teacher Attendance System</p>
              </div>

              {authMode === 'login' ? (
                <form onSubmit={handleLogin} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input name="username" type="text" required className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" placeholder="e.g. teacher" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input name="password" type="password" required className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" placeholder="••••••••" />
                  </div>
                  <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-sm">
                    Log In
                  </button>
                </form>
              ) : (
                <form onSubmit={handleSignup} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input name="name" type="text" required className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" placeholder="e.g. Mrs. Santos" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Choose a Username</label>
                    <input name="username" type="text" required className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Create Password</label>
                    <input name="password" type="password" required className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" />
                  </div>
                  <button type="submit" className="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition shadow-sm">
                    Create Account
                  </button>
                </form>
              )}

              <div className="mt-6 text-center">
                <button 
                  onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')}
                  className="text-blue-600 hover:text-blue-800 font-medium text-sm transition"
                >
                  {authMode === 'login' ? "New teacher? Create an account here" : "Already registered? Log in here"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      const teacherClasses = classes.filter(c => c.teacherId === currentUser.id);
      const activeClass = classes.find(c => c.id === activeClassId);

      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-blue-800 text-white px-6 py-4 flex justify-between items-center shadow-md">
            <div className="flex items-center gap-3">
              <School className="w-6 h-6" />
              <h1 className="text-xl font-bold hidden sm:block">Students Attendance Tracker</h1>
            </div>
            <div className="flex items-center gap-4">
              <span className="font-medium text-sm bg-blue-900/50 px-3 py-1 rounded-full">
                {currentUser.name}
              </span>
              <button onClick={handleLogout} className="hover:bg-blue-700 p-2 rounded-full transition" title="Log Out">
                <LogOut className="w-5 h-5" />
              </button>
            </div>
          </header>

          <main className="p-4 sm:p-6 max-w-6xl mx-auto w-full">
            
            {/* DASHBOARD VIEW */}
            {view === 'dashboard' && (
              <div className="animate-in fade-in">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-2xl font-bold text-slate-800">My Classes</h2>
                  <button 
                    onClick={() => setView('create-class')} 
                    className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2"
                  >
                    <Plus className="w-4 h-4" /> Add Class
                  </button>
                </div>

                {teacherClasses.length === 0 ? (
                  <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center">
                    <School className="w-16 h-16 text-slate-300 mx-auto mb-4" />
                    <h3 className="text-xl font-bold text-slate-600 mb-2">Welcome to your dashboard!</h3>
                    <p className="text-slate-500">You don't have any classes yet. Click "Add Class" to get started.</p>
                  </div>
                ) : (
                  <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {teacherClasses.map(cls => (
                      <div 
                        key={cls.id} 
                        className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition cursor-pointer group"
                        onClick={() => {
                          setActiveClassId(cls.id);
                          setActiveTab('record');
                          setView('class-detail');
                        }}
                      >
                        <div className="flex justify-between items-start mb-4">
                          <div>
                            <h3 className="text-lg font-bold text-slate-800 group-hover:text-blue-600 transition">{cls.name}</h3>
                            <p className="text-sm font-bold text-blue-600 mt-1">{cls.subject}</p>
                            <p className="text-sm text-slate-500">SY: {cls.schoolYear}</p>
                          </div>
                          <div className="bg-blue-50 text-blue-600 p-3 rounded-lg">
                            <Users size={20} />
                          </div>
                        </div>
                        <div className="pt-4 border-t border-slate-100 flex items-center gap-2 text-slate-600 text-sm font-medium">
                          <span>{cls.students.length} Enrolled Students</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* CREATE CLASS VIEW */}
            {view === 'create-class' && (
              <CreateClassView 
                currentUser={currentUser} 
                classes={classes}
                setClasses={setClasses} 
                onGoBack={() => setView('dashboard')} 
              />
            )}

            {/* CLASS DETAIL VIEW */}
            {view === 'class-detail' && activeClass && (
              <div className="animate-in fade-in space-y-6">
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col sm:flex-row gap-4 justify-between items-center">
                  <div className="flex items-center gap-4 w-full sm:w-auto">
                    <button onClick={() => setView('dashboard')} className="p-2 hover:bg-slate-100 rounded-full text-slate-500 transition">
                      <ChevronLeft className="w-6 h-6" />
                    </button>
                    <div>
                      <h1 className="text-xl font-bold text-slate-800">{activeClass.name} <span className="text-slate-400 font-normal mx-1">|</span> {activeClass.subject}</h1>
                      <p className="text-sm text-slate-500">{activeClass.students.length} Students</p>
                    </div>
                  </div>
                  <div className="flex bg-slate-100 p-1 rounded-lg w-full sm:w-auto">
                    <button 
                      onClick={() => setActiveTab('record')}
                      className={`flex-1 flex justify-center items-center gap-2 px-4 py-2.5 rounded-md font-medium text-sm transition ${activeTab === 'record' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}
                    >
                      <CalendarDays className="w-4 h-4" /> Record
                    </button>
                    <button 
                      onClick={() => setActiveTab('report')}
                      className={`flex-1 flex justify-center items-center gap-2 px-4 py-2.5 rounded-md font-medium text-sm transition ${activeTab === 'report' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}
                    >
                      <FileSpreadsheet className="w-4 h-4" /> Monthly Report
                    </button>
                  </div>
                </div>

                {activeTab === 'record' && <AttendanceRecordTab activeClass={activeClass} setClasses={setClasses} />}
                {activeTab === 'report' && <MonthlyReportTab activeClass={activeClass} />}
              </div>
            )}

          </main>
        </div>
      );
    }

    // --- SUB-COMPONENTS ---

    function CreateClassView({ currentUser, classes, setClasses, onGoBack }) {
      const [className, setClassName] = useState('');
      const [subject, setSubject] = useState('');
      const [schoolYear, setSchoolYear] = useState('2025-2026');
      const [addMode, setAddMode] = useState('single'); 
      
      const [roster, setRoster] = useState([]);
      const [singleName, setSingleName] = useState('');
      const [singleGender, setSingleGender] = useState('Male');
      const [bulkText, setBulkText] = useState('');
      const [bulkGender, setBulkGender] = useState('Male');
      const [importClassId, setImportClassId] = useState('');

      const handleAddSingle = () => {
        if (!singleName.trim()) return;
        setRoster([...roster, { id: 's' + Date.now(), name: singleName.trim(), gender: singleGender }]);
        setSingleName('');
      };

      const handleAddBulk = () => {
        const lines = bulkText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        if (lines.length === 0) return;

        const newStudents = lines.map((name, idx) => ({
          id: 's' + Date.now() + idx,
          name,
          gender: bulkGender
        }));

        setRoster([...roster, ...newStudents]);
        setBulkText('');
      };

      const handleRemoveStudent = (id) => {
        setRoster(roster.filter(s => s.id !== id));
      };

      const handleImport = () => {
        const selectedClass = classes.find(c => c.id === importClassId);
        if (!selectedClass) return;

        const newStudents = selectedClass.students.map((s, idx) => ({
          id: 's' + Date.now() + idx,
          name: s.name,
          gender: s.gender
        }));

        const existingNames = new Set(roster.map(r => r.name.toLowerCase()));
        const filteredNew = newStudents.filter(s => !existingNames.has(s.name.toLowerCase()));

        setRoster([...roster, ...filteredNew]);
        setImportClassId('');
      };

      const handleSaveClass = () => {
        if (!className.trim() || !subject.trim()) {
          alert("Please enter a class name and subject.");
          return;
        }

        const newClass = {
          id: 'c' + Date.now(),
          teacherId: currentUser.id,
          name: className,
          subject: subject,
          schoolYear: schoolYear,
          students: roster.sort((a,b) => a.name.localeCompare(b.name)),
          attendance: {}
        };

        setClasses(prev => [...prev, newClass]);
        onGoBack();
      };

      return (
        <div className="space-y-6 animate-in fade-in">
          <div className="flex items-center gap-4 mb-2">
            <button onClick={onGoBack} className="p-2 hover:bg-slate-200 rounded-full transition bg-white shadow-sm">
              <ChevronLeft className="w-5 h-5 text-slate-600" />
            </button>
            <h2 className="text-2xl font-bold text-slate-800">Create New Class</h2>
          </div>

          <div className="grid md:grid-cols-2 gap-6">
            <div className="space-y-6">
              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h3 className="font-bold text-slate-800 mb-4 border-b pb-2">1. Class Details</h3>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Section Name</label>
                    <input type="text" value={className} onChange={e => setClassName(e.target.value)} placeholder="e.g. Grade 10 - Rizal" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Subject</label>
                    <input type="text" value={subject} onChange={e => setSubject(e.target.value)} placeholder="e.g. Mathematics" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">School Year</label>
                    <input type="text" value={schoolYear} onChange={e => setSchoolYear(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" />
                  </div>
                </div>
              </div>

              <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div className="flex justify-between items-center mb-4 border-b pb-2">
                  <h3 className="font-bold text-slate-800">2. Add Students</h3>
                  <div className="flex bg-slate-100 p-1 rounded-lg">
                    <button onClick={() => setAddMode('single')} className={`px-3 py-1 text-xs rounded font-medium ${addMode === 'single' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-600'}`}>Single</button>
                    <button onClick={() => setAddMode('bulk')} className={`px-3 py-1 text-xs rounded font-medium ${addMode === 'bulk' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-600'}`}>Bulk</button>
                    {classes.length > 0 && (
                      <button onClick={() => setAddMode('import')} className={`px-3 py-1 text-xs rounded font-medium ${addMode === 'import' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-600'}`}>Import</button>
                    )}
                  </div>
                </div>

                {addMode === 'single' && (
                  <div className="space-y-3">
                    <input type="text" value={singleName} onChange={e => setSingleName(e.target.value)} placeholder="Last Name, First Name" className="w-full p-2.5 border border-slate-300 rounded-lg outline-none" />
                    <div className="flex gap-2">
                      <select value={singleGender} onChange={e => setSingleGender(e.target.value)} className="flex-1 p-2.5 border border-slate-300 rounded-lg outline-none bg-white">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                      </select>
                      <button onClick={handleAddSingle} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700">Add</button>
                    </div>
                  </div>
                )}
                
                {addMode === 'bulk' && (
                  <div className="space-y-3">
                    <p className="text-xs text-slate-500">Paste names below (one per line). All will be assigned the selected gender.</p>
                    <textarea value={bulkText} onChange={e => setBulkText(e.target.value)} placeholder="Dela Cruz, Juan&#10;Santos, Mark" className="w-full p-3 border border-slate-300 rounded-lg outline-none h-32 resize-none" />
                    <div className="flex gap-2">
                      <select value={bulkGender} onChange={e => setBulkGender(e.target.value)} className="flex-1 p-2 border border-slate-300 rounded-lg outline-none bg-white text-sm">
                        <option value="Male">Assign as Male</option>
                        <option value="Female">Assign as Female</option>
                      </select>
                      <button onClick={handleAddBulk} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 flex items-center gap-1">
                        <ListPlus className="w-4 h-4" /> Add All
                      </button>
                    </div>
                  </div>
                )}

                {addMode === 'import' && (
                  <div className="space-y-3">
                    <p className="text-xs text-slate-500">Select an existing class from the system to copy its student roster.</p>
                    <select 
                      value={importClassId} 
                      onChange={e => setImportClassId(e.target.value)}
                      className="w-full p-2.5 border border-slate-300 rounded-lg outline-none bg-white text-sm"
                    >
                      <option value="">-- Choose a Class --</option>
                      {classes.map(c => (
                        <option key={c.id} value={c.id}>
                          {c.name} ({c.subject}) - SY: {c.schoolYear} - {c.students.length} students
                        </option>
                      ))}
                    </select>
                    <button 
                      onClick={handleImport} 
                      disabled={!importClassId}
                      className="w-full bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed flex justify-center items-center gap-2"
                    >
                      <Copy className="w-4 h-4" /> Import Roster
                    </button>
                  </div>
                )}
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[600px] md:h-auto">
              <div className="p-4 border-b border-slate-200 bg-slate-50">
                <h3 className="font-bold text-slate-800">Class Roster ({roster.length})</h3>
              </div>
              
              <div className="flex-1 overflow-y-auto p-4 bg-slate-50/50">
                {roster.length === 0 ? (
                  <div className="text-center text-slate-500 py-12">
                    No students added yet.
                  </div>
                ) : (
                  <ul className="space-y-2">
                    {roster.map((student, i) => (
                      <li key={student.id} className="flex justify-between items-center bg-white p-3 rounded border border-slate-200 shadow-sm">
                        <div>
                          <span className="font-medium text-slate-800 text-sm">{i + 1}. {student.name}</span>
                          <span className={`ml-2 text-xs px-2 py-0.5 rounded-full ${student.gender === 'Male' ? 'bg-blue-50 text-blue-600' : 'bg-pink-50 text-pink-600'}`}>
                            {student.gender}
                          </span>
                        </div>
                        <button onClick={() => handleRemoveStudent(student.id)} className="text-red-500 hover:text-red-700 p-1">
                          <XCircle className="w-4 h-4" />
                        </button>
                      </li>
                    ))}
                  </ul>
                )}
              </div>

              <div className="p-4 border-t border-slate-200">
                <button onClick={handleSaveClass} className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg flex justify-center items-center gap-2 transition">
                  <Save className="w-5 h-5" /> Save New Class
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function AttendanceRecordTab({ activeClass, setClasses }) {
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [tempAttendance, setTempAttendance] = useState({});
      const [isSaved, setIsSaved] = useState(true);

      useMemo(() => {
        const existing = activeClass.attendance[selectedDate] || {};
        const initialTemp = {};
        activeClass.students.forEach(s => {
          initialTemp[s.id] = existing[s.id] || 'Present';
        });
        setTempAttendance(initialTemp);
        setIsSaved(true);
      }, [selectedDate, activeClass]);

      const toggleStatus = (studentId, status) => {
        setTempAttendance(prev => ({ ...prev, [studentId]: status }));
        setIsSaved(false);
      };

      const saveAttendance = () => {
        setClasses(prevClasses => prevClasses.map(cls => {
          if (cls.id === activeClass.id) {
            return {
              ...cls,
              attendance: {
                ...cls.attendance,
                [selectedDate]: tempAttendance
              }
            };
          }
          return cls;
        }));
        setIsSaved(true);
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
          <div className="p-4 sm:p-6 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4 bg-slate-50">
            <div className="flex items-center gap-3 w-full sm:w-auto">
              <label className="font-bold text-slate-700">Record for Date:</label>
              <input 
                type="date" 
                value={selectedDate}
                onChange={(e) => setSelectedDate(e.target.value)}
                className="border-slate-300 rounded-lg p-2.5 border focus:ring-2 focus:ring-blue-500 outline-none bg-white font-medium"
              />
            </div>
            <button 
              onClick={saveAttendance}
              disabled={isSaved}
              className={`w-full sm:w-auto flex justify-center items-center gap-2 px-6 py-2.5 rounded-lg font-bold transition ${isSaved ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-md'}`}
            >
              {isSaved ? <><Check className="w-5 h-5" /> Saved</> : <><Save className="w-5 h-5" /> Save Changes</>}
            </button>
          </div>

          <div className="overflow-x-auto">
            <table className="w-full text-left border-collapse">
              <thead>
                <tr className="bg-white text-slate-500 text-sm uppercase tracking-wider border-b border-slate-200">
                  <th className="p-4 font-bold">Student Name</th>
                  <th className="p-4 font-bold text-center w-64">Attendance Status</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {activeClass.students.map((student, idx) => (
                  <tr key={student.id} className="hover:bg-blue-50/30 transition">
                    <td className="p-4 font-medium text-slate-800">
                      <span className="text-slate-400 mr-2">{idx + 1}.</span> {student.name}
                    </td>
                    <td className="p-4">
                      <div className="flex items-center justify-center gap-2">
                        <button
                          onClick={() => toggleStatus(student.id, 'Present')}
                          className={`flex-1 flex justify-center items-center gap-1 px-3 py-2 rounded-lg text-sm font-bold transition border ${tempAttendance[student.id] === 'Present' ? 'bg-green-100 text-green-700 border-green-300 shadow-inner' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}
                        >
                          <CheckCircle2 size={18} /> Present
                        </button>
                        <button
                          onClick={() => toggleStatus(student.id, 'Absent')}
                          className={`flex-1 flex justify-center items-center gap-1 px-3 py-2 rounded-lg text-sm font-bold transition border ${tempAttendance[student.id] === 'Absent' ? 'bg-red-100 text-red-700 border-red-300 shadow-inner' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}
                        >
                          <XCircle size={18} /> Absent
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function MonthlyReportTab({ activeClass }) {
      const allRecordedDates = Object.keys(activeClass.attendance).sort();
      const availableMonths = [...new Set(allRecordedDates.map(date => date.substring(0, 7)))];
      
      const [selectedMonth, setSelectedMonth] = useState(
        availableMonths.length > 0 ? availableMonths[availableMonths.length - 1] : new Date().toISOString().substring(0, 7)
      );

      const datesInSelectedMonth = allRecordedDates.filter(date => date.startsWith(selectedMonth));

      const maleStudents = activeClass.students.filter(s => s.gender === 'Male');
      const femaleStudents = activeClass.students.filter(s => s.gender === 'Female');
      const otherStudents = activeClass.students.filter(s => s.gender !== 'Male' && s.gender !== 'Female');

      const getDayOnly = (dateStr) => dateStr.split('-')[2];

      const renderStudentRow = (student, index) => {
        let presentTotal = 0;
        let absentTotal = 0;

        const cells = datesInSelectedMonth.map(date => {
          const status = activeClass.attendance[date]?.[student.id];
          if (status === 'Present') presentTotal++;
          if (status === 'Absent') absentTotal++;

          return (
            <td key={date} className="p-2 border border-slate-200 text-center min-w-[36px]">
              {status === 'Present' && <span className="text-green-600 font-bold">P</span>}
              {status === 'Absent' && <span className="text-red-500 font-bold">A</span>}
              {!status && <span className="text-slate-300">-</span>}
            </td>
          );
        });

        return (
          <tr key={student.id} className="hover:bg-slate-50 transition">
            <td className="p-2 px-3 border border-slate-200 sticky left-0 bg-white z-10 text-sm font-medium text-slate-800 whitespace-nowrap shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
              {index + 1}. {student.name}
            </td>
            {cells}
            <td className="p-2 border border-slate-200 text-center font-bold text-green-700 bg-green-50">{presentTotal}</td>
            <td className="p-2 border border-slate-200 text-center font-bold text-red-600 bg-red-50">{absentTotal}</td>
          </tr>
        );
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
          <div className="p-4 sm:p-6 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4 bg-slate-50">
            <div className="flex items-center gap-2">
              <BarChart4 className="w-6 h-6 text-blue-600" />
              <h2 className="text-lg font-bold text-slate-800">Monthly Attendance Matrix</h2>
            </div>
            <div className="flex items-center gap-3">
              <label className="font-semibold text-slate-700 text-sm">Select Month:</label>
              <input 
                type="month" 
                value={selectedMonth}
                onChange={(e) => setSelectedMonth(e.target.value)}
                className="border-slate-300 rounded-md p-2 border focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white"
              />
            </div>
          </div>

          <div className="p-4 sm:p-6">
            {datesInSelectedMonth.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-16 text-slate-500 bg-slate-50 rounded-lg border border-dashed border-slate-300">
                <AlertCircle className="w-12 h-12 text-slate-300 mb-3" />
                <p className="text-lg font-bold text-slate-700">No records found</p>
                <p className="text-sm">There is no recorded attendance for the selected month.</p>
              </div>
            ) : (
              <div className="overflow-x-auto border border-slate-200 rounded-lg shadow-sm">
                <table className="w-full text-left border-collapse min-w-max">
                  <thead>
                    <tr className="bg-slate-800 text-white text-xs uppercase tracking-wider">
                      <th className="p-3 border border-slate-700 sticky left-0 z-20 bg-slate-800 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.5)]">
                        Student Name
                      </th>
                      {datesInSelectedMonth.map(date => (
                        <th key={date} className="p-2 border border-slate-700 text-center font-medium">
                          {getDayOnly(date)}
                        </th>
                      ))}
                      <th className="p-3 border border-slate-700 text-center bg-slate-700">Present</th>
                      <th className="p-3 border border-slate-700 text-center bg-slate-700">Absent</th>
                    </tr>
                  </thead>
                  <tbody>
                    {maleStudents.length > 0 && (
                      <>
                        <tr>
                          <td colSpan={datesInSelectedMonth.length + 3} className="bg-blue-100 p-2 px-3 font-bold text-blue-900 sticky left-0 text-sm border-b border-blue-200">
                            MALE
                          </td>
                        </tr>
                        {maleStudents.map((student, index) => renderStudentRow(student, index))}
                      </>
                    )}

                    {femaleStudents.length > 0 && (
                      <>
                        <tr>
                          <td colSpan={datesInSelectedMonth.length + 3} className="bg-pink-100 p-2 px-3 font-bold text-pink-900 sticky left-0 text-sm border-b border-pink-200">
                            FEMALE
                          </td>
                        </tr>
                        {femaleStudents.map((student, index) => renderStudentRow(student, index))}
                      </>
                    )}

                    {otherStudents.length > 0 && (
                      <>
                        <tr>
                          <td colSpan={datesInSelectedMonth.length + 3} className="bg-slate-200 p-2 px-3 font-bold text-slate-700 sticky left-0 text-sm border-b border-slate-300">
                            UNSPECIFIED
                          </td>
                        </tr>
                        {otherStudents.map((student, index) => renderStudentRow(student, index))}
                      </>
                    )}
                  </tbody>
                </table>
              </div>
            )}
            
            {datesInSelectedMonth.length > 0 && (
              <div className="mt-6 flex flex-wrap gap-6 text-sm text-slate-600 bg-slate-50 p-4 rounded-lg border border-slate-200 w-fit">
                <span className="flex items-center gap-2"><span className="w-5 h-5 flex items-center justify-center bg-green-100 text-green-700 font-bold rounded">P</span> = Present</span>
                <span className="flex items-center gap-2"><span className="w-5 h-5 flex items-center justify-center bg-red-100 text-red-700 font-bold rounded">A</span> = Absent</span>
                <span className="flex items-center gap-2"><span className="w-5 h-5 flex items-center justify-center bg-slate-200 text-slate-500 font-bold rounded">-</span> = No Record</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Initialize the app
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
