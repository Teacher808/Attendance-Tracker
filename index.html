<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Students Attendance Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom scrollbar for better aesthetics on wide tables */
    .custom-scrollbar::-webkit-scrollbar {
      height: 8px;
      width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9; 
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1; 
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8; 
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-blue-200 selection:text-blue-900">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      School, Users, CalendarDays, BarChart4, LogOut, 
      CheckCircle2, XCircle, ChevronLeft, Save, AlertCircle, 
      FileSpreadsheet, Plus, ListPlus, Check, Copy, Percent, 
      Cloud, CloudOff, RefreshCw, Loader2, Mail, Lock, LogIn, UserPlus
    } from 'https://esm.sh/lucide-react@0.292.0';

    // --- FIREBASE IMPORTS ---
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { 
      getAuth, signInWithCustomToken, onAuthStateChanged, 
      signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { 
      getFirestore, collection, doc, setDoc, getDoc, updateDoc, 
      onSnapshot, enableIndexedDbPersistence 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // --- FIREBASE INITIALIZATION ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // Enable offline persistence (caches data so you can read/write while offline)
    try {
      enableIndexedDbPersistence(db).catch((err) => {
        if (err.code === 'failed-precondition') {
          console.warn('Multiple tabs open, offline persistence can only be enabled in one tab at a time.');
        } else if (err.code === 'unimplemented') {
          console.warn('The current browser does not support all of the features required to enable offline persistence.');
        }
      });
    } catch (e) {
      console.error("Persistence init error", e);
    }

    // --- MAIN APP COMPONENT ---
    function App() {
      // Auth & Profile State
      const [user, setUser] = useState(null);
      const [loadingAuth, setLoadingAuth] = useState(true);
      const [profileState, setProfileState] = useState('loading'); // 'loading', 'needs_name', 'ready'
      const [teacherName, setTeacherName] = useState('');
      
      // Data State
      const [classes, setClasses] = useState([]);
      
      // Navigation State
      const [view, setView] = useState('dashboard');
      const [activeClassId, setActiveClassId] = useState(null);
      const [activeTab, setActiveTab] = useState('record');

      // Network State
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [isSyncing, setIsSyncing] = useState(false);

      // Network Event Listeners
      useEffect(() => {
        const handleOnline = () => setIsOnline(true);
        const handleOffline = () => setIsOnline(false);
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        return () => { 
          window.removeEventListener('online', handleOnline); 
          window.removeEventListener('offline', handleOffline); 
        };
      }, []);

      // 1. Authentication Check
      useEffect(() => {
        const initAuth = async () => {
          try {
            // Priority to platform injected token if it exists (for seamless preview)
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            }
          } catch (error) {
            console.error("Auth init error:", error);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);
          setLoadingAuth(false);
          if (!u) {
            // Reset state on logout
            setClasses([]);
            setProfileState('loading');
            setTeacherName('');
            setView('dashboard');
          }
        });
        return () => unsubscribe();
      }, []);

      // 2. Fetch Profile and Classes from Firestore
      useEffect(() => {
        if (!user) return;

        // Fetch user profile (display name)
        const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info');
        getDoc(profileRef).then(d => {
          if (d.exists() && d.data().name) {
            setTeacherName(d.data().name);
            setProfileState('ready');
          } else {
            setProfileState('needs_name');
          }
        }).catch(() => setProfileState('needs_name'));

        // Real-time listener for classes
        const classesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'classes');
        const unsubscribe = onSnapshot(classesRef, { includeMetadataChanges: true }, (snapshot) => {
          const fetchedClasses = [];
          snapshot.forEach(document => {
            fetchedClasses.push({ id: document.id, ...document.data() });
          });
          // Sort classes alphabetically by name
          fetchedClasses.sort((a,b) => a.name.localeCompare(b.name));
          setClasses(fetchedClasses);
          
          // Update sync status indicator
          setIsSyncing(snapshot.metadata.hasPendingWrites);
        }, (error) => {
          console.error("Firestore error:", error);
        });

        return () => unsubscribe();
      }, [user]);

      // --- HANDLERS ---
      const handleSaveProfileName = async (name) => {
        if (!user || !name.trim()) return;
        setTeacherName(name.trim());
        setProfileState('ready');
        try {
          const profileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info');
          await setDoc(profileRef, { name: name.trim() });
        } catch(e) {
          console.error("Error saving profile", e);
        }
      };

      const handleLogout = async () => {
        try {
          await signOut(auth);
        } catch (error) {
          console.error("Error signing out:", error);
        }
      };

      // --- RENDER SCREENS ---
      if (loadingAuth || (user && profileState === 'loading')) {
        return (
          <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center">
            <Loader2 className="w-10 h-10 text-blue-600 animate-spin mb-4" />
            <p className="text-slate-500 font-medium">Connecting to the Cloud...</p>
          </div>
        );
      }

      // Authentication Screen (Login / Register)
      if (!user) {
        return <AuthScreen auth={auth} />;
      }

      // Welcome Screen (First time login)
      if (profileState === 'needs_name') {
        return <WelcomeScreen onSave={handleSaveProfileName} />;
      }

      const activeClass = classes.find(c => c.id === activeClassId);

      return (
        <div className="min-h-screen bg-slate-100 flex flex-col">
          {/* TOP NAVIGATION HEADER */}
          <header className="bg-blue-800 text-white shadow-md sticky top-0 z-50">
            <div className="max-w-[1600px] mx-auto px-4 sm:px-6 py-3 sm:py-4 flex justify-between items-center gap-4">
              <div className="flex items-center gap-3">
                <School className="w-6 h-6 sm:w-7 sm:h-7 shrink-0" />
                <h1 className="text-lg sm:text-xl font-bold truncate hidden sm:block">Attendance Tracker Secure Cloud</h1>
                <h1 className="text-lg font-bold truncate sm:hidden">EduTrack</h1>
              </div>
              
              <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                {/* Network Status Indicator */}
                <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full border bg-white/10 border-white/20 hidden sm:flex">
                  {!isOnline ? (
                    <><CloudOff className="w-4 h-4 text-amber-300" /> <span className="text-xs font-semibold text-amber-100">Offline</span></>
                  ) : isSyncing ? (
                    <><RefreshCw className="w-4 h-4 text-blue-300 animate-spin" /> <span className="text-xs font-semibold text-blue-100">Syncing...</span></>
                  ) : (
                    <><Cloud className="w-4 h-4 text-emerald-300" /> <span className="text-xs font-semibold text-emerald-100">Synced</span></>
                  )}
                </div>

                <div className="flex items-center gap-2 sm:gap-3 bg-blue-900/40 px-3 py-1.5 rounded-full border border-blue-700/50">
                  <span className="font-medium text-xs sm:text-sm truncate max-w-[100px] sm:max-w-[150px]">
                    {teacherName}
                  </span>
                  <div className="w-px h-4 bg-blue-700 mx-1 hidden sm:block"></div>
                  <button 
                    onClick={handleLogout}
                    className="flex items-center gap-1.5 text-blue-200 hover:text-white transition-colors"
                    title="Logout"
                  >
                    <LogOut className="w-4 h-4 sm:w-4 sm:h-4" />
                    <span className="text-xs font-semibold hidden sm:inline">Logout</span>
                  </button>
                </div>
              </div>
            </div>
          </header>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 w-full max-w-[1600px] mx-auto p-4 sm:p-6 lg:p-8">
            
            {/* DASHBOARD VIEW */}
            {view === 'dashboard' && (
              <div className="animate-in fade-in space-y-6">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                  <div>
                    <h2 className="text-2xl sm:text-3xl font-extrabold text-slate-800">My Classes</h2>
                    <p className="text-slate-500 text-sm mt-1">Manage your class sections and track attendance.</p>
                  </div>
                  <button 
                    onClick={() => setView('create-class')} 
                    className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-semibold transition-colors flex items-center justify-center gap-2 shadow-sm"
                  >
                    <Plus className="w-5 h-5" /> Add New Class
                  </button>
                </div>

                {classes.length === 0 ? (
                  <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-8 sm:p-16 text-center shadow-sm">
                    <div className="bg-slate-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                      <School className="w-12 h-12 text-slate-400" />
                    </div>
                    <h3 className="text-xl sm:text-2xl font-bold text-slate-700 mb-2">Welcome to your dashboard!</h3>
                    <p className="text-slate-500 max-w-md mx-auto">You don't have any classes setup yet. Click "Add New Class" to build your roster and start tracking attendance.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
                    {classes.map(cls => (
                      <div 
                        key={cls.id} 
                        className="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md hover:border-blue-300 transition-all cursor-pointer group flex flex-col h-full relative overflow-hidden"
                        onClick={() => {
                          setActiveClassId(cls.id);
                          setActiveTab('record');
                          setView('class-detail');
                        }}
                      >
                        <div className="absolute top-0 left-0 w-1 h-full bg-blue-500 rounded-l-2xl"></div>
                        <div className="flex justify-between items-start mb-4 gap-2">
                          <div className="flex-1 min-w-0">
                            <h3 className="text-lg font-bold text-slate-800 group-hover:text-blue-600 transition-colors truncate">{cls.name}</h3>
                            <p className="text-sm font-semibold text-blue-600 mt-1 truncate">{cls.subject}</p>
                            <p className="text-xs text-slate-500 mt-1">SY: {cls.schoolYear}</p>
                          </div>
                          <div className="bg-blue-50 text-blue-600 p-3 rounded-xl shrink-0 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                            <Users size={20} />
                          </div>
                        </div>
                        <div className="mt-auto pt-4 border-t border-slate-100 flex items-center justify-between text-slate-600 text-sm font-medium">
                          <span className="flex items-center gap-1.5"><Users className="w-4 h-4" /> {cls.students.length} Enrolled</span>
                          <ChevronLeft className="w-4 h-4 rotate-180 text-slate-300 group-hover:text-blue-600 transition-colors" />
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* CREATE CLASS VIEW */}
            {view === 'create-class' && (
              <CreateClassView 
                user={user} 
                classes={classes}
                onGoBack={() => setView('dashboard')} 
              />
            )}

            {/* CLASS DETAIL VIEW */}
            {view === 'class-detail' && activeClass && (
              <div className="animate-in fade-in space-y-4 sm:space-y-6">
                
                {/* Responsive Header Card */}
                <div className="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col lg:flex-row gap-4 justify-between items-start lg:items-center relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500 rounded-l-2xl hidden lg:block"></div>
                  <div className="flex items-center gap-3 sm:gap-4 w-full lg:w-auto z-10">
                    <button 
                      onClick={() => setView('dashboard')} 
                      className="p-2 sm:p-2.5 hover:bg-slate-100 rounded-full text-slate-500 hover:text-slate-800 transition-colors shrink-0 bg-slate-50 border border-slate-200"
                    >
                      <ChevronLeft className="w-5 h-5 sm:w-6 sm:h-6" />
                    </button>
                    <div className="min-w-0 flex-1">
                      <h1 className="text-lg sm:text-xl font-bold text-slate-800 truncate flex flex-col sm:flex-row sm:items-center sm:gap-2">
                        <span className="truncate">{activeClass.name}</span>
                        <span className="hidden sm:inline text-slate-300 font-normal">|</span>
                        <span className="text-blue-600 truncate text-base">{activeClass.subject}</span>
                      </h1>
                      <p className="text-xs sm:text-sm text-slate-500 mt-0.5">{activeClass.students.length} Students Enrolled</p>
                    </div>
                  </div>
                  
                  {/* Tab Navigation */}
                  <div className="flex bg-slate-100 p-1.5 rounded-xl w-full lg:w-auto overflow-x-auto custom-scrollbar z-10">
                    <button 
                      onClick={() => setActiveTab('record')}
                      className={`flex-1 lg:flex-none min-w-[140px] flex justify-center items-center gap-2 px-4 py-2.5 rounded-lg font-semibold text-sm transition-all whitespace-nowrap ${activeTab === 'record' ? 'bg-white text-blue-700 shadow-sm border border-slate-200/50' : 'text-slate-600 hover:text-slate-900 hover:bg-slate-200/50'}`}
                    >
                      <CalendarDays className="w-4 h-4 sm:w-5 sm:h-5" /> Record Today
                    </button>
                    <button 
                      onClick={() => setActiveTab('report')}
                      className={`flex-1 lg:flex-none min-w-[140px] flex justify-center items-center gap-2 px-4 py-2.5 rounded-lg font-semibold text-sm transition-all whitespace-nowrap ${activeTab === 'report' ? 'bg-white text-blue-700 shadow-sm border border-slate-200/50' : 'text-slate-600 hover:text-slate-900 hover:bg-slate-200/50'}`}
                    >
                      <FileSpreadsheet className="w-4 h-4 sm:w-5 sm:h-5" /> Monthly Matrix
                    </button>
                  </div>
                </div>

                {/* Tab Contents */}
                <div className="w-full">
                  {activeTab === 'record' && <AttendanceRecordTab activeClass={activeClass} user={user} />}
                  {activeTab === 'report' && <MonthlyReportTab activeClass={activeClass} />}
                </div>
              </div>
            )}

          </main>
        </div>
      );
    }

    // --- SUB-COMPONENTS ---

    // New Authentication Screen
    function AuthScreen({ auth }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setIsLoading(true);

        try {
          if (isLogin) {
            await signInWithEmailAndPassword(auth, email, password);
          } else {
            await createUserWithEmailAndPassword(auth, email, password);
          }
        } catch (err) {
          // Format Firebase error messages nicely
          let niceError = err.message;
          if (err.code === 'auth/invalid-email') niceError = "Invalid email address format.";
          if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') niceError = "Incorrect email or password.";
          if (err.code === 'auth/email-already-in-use') niceError = "An account with this email already exists.";
          if (err.code === 'auth/weak-password') niceError = "Password should be at least 6 characters.";
          
          setError(niceError);
          setIsLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full animate-in fade-in slide-in-from-bottom-4">
            
            <div className="text-center mb-8">
              <div className="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 rotate-3">
                <School className="w-8 h-8 text-blue-600 -rotate-3" />
              </div>
              <h2 className="text-2xl font-bold text-slate-800">EduTrack</h2>
              <p className="text-slate-500 text-sm mt-1">
                {isLogin ? 'Sign in to sync your attendance data' : 'Create an account to get started'}
              </p>
            </div>

            {error && (
              <div className="mb-6 p-3 bg-red-50 text-red-700 rounded-xl flex items-start gap-2 text-sm border border-red-200">
                <AlertCircle className="w-5 h-5 shrink-0" />
                <p>{error}</p>
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Email Address</label>
                <div className="relative">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <Mail className="h-5 w-5 text-slate-400" />
                  </div>
                  <input 
                    type="email" 
                    required
                    value={email}
                    onChange={e => setEmail(e.target.value)}
                    className="w-full pl-10 p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 transition-shadow"
                    placeholder="teacher@school.edu"
                  />
                </div>
              </div>

              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                <div className="relative">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <Lock className="h-5 w-5 text-slate-400" />
                  </div>
                  <input 
                    type="password" 
                    required
                    value={password}
                    onChange={e => setPassword(e.target.value)}
                    className="w-full pl-10 p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 transition-shadow"
                    placeholder="••••••••"
                  />
                </div>
              </div>

              <button 
                type="submit" 
                disabled={isLoading}
                className="w-full bg-blue-600 text-white p-3.5 rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-md flex justify-center items-center gap-2 disabled:bg-blue-400"
              >
                {isLoading ? (
                  <RefreshCw className="w-5 h-5 animate-spin" />
                ) : isLogin ? (
                  <><LogIn className="w-5 h-5" /> Sign In</>
                ) : (
                  <><UserPlus className="w-5 h-5" /> Create Account</>
                )}
              </button>
            </form>

            <div className="mt-8 pt-6 border-t border-slate-100 text-center">
              <p className="text-slate-600 text-sm">
                {isLogin ? "Don't have an account?" : "Already have an account?"}
                <button 
                  onClick={() => { setIsLogin(!isLogin); setError(''); }}
                  className="ml-2 text-blue-600 font-bold hover:underline"
                >
                  {isLogin ? 'Sign up' : 'Log in'}
                </button>
              </p>
            </div>

          </div>
        </div>
      );
    }

    function WelcomeScreen({ onSave }) {
      const [name, setName] = useState('');
      
      const handleSubmit = (e) => {
        e.preventDefault();
        onSave(name);
      };

      return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center animate-in fade-in">
            <div className="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
              <School className="w-10 h-10 text-blue-600" />
            </div>
            <h2 className="text-2xl font-bold mb-2 text-slate-800">Students Attendance Tracker</h2>
            <p className="text-slate-500 mb-8 text-sm">Let's complete your profile setup before we begin tracking attendance.</p>
            
            <form onSubmit={handleSubmit}>
              <div className="mb-6 text-left">
                <label className="block text-sm font-semibold text-slate-700 mb-2">How should we address you?</label>
                <input 
                  type="text" 
                  required
                  value={name} 
                  onChange={e => setName(e.target.value)} 
                  placeholder="e.g. Mr. Dela Cruz" 
                  className="w-full p-3.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 transition-shadow" 
                />
              </div>
              <button 
                type="submit" 
                className="w-full bg-blue-600 text-white p-3.5 rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-md flex justify-center items-center gap-2"
              >
                Start Teaching
              </button>
            </form>
          </div>
        </div>
      );
    }

    function CreateClassView({ user, classes, onGoBack }) {
      const [className, setClassName] = useState('');
      const [subject, setSubject] = useState('');
      const [schoolYear, setSchoolYear] = useState('2025-2026');
      const [addMode, setAddMode] = useState('single'); 
      const [errorMsg, setErrorMsg] = useState('');
      
      const [roster, setRoster] = useState([]);
      const [singleName, setSingleName] = useState('');
      const [singleGender, setSingleGender] = useState('Male');
      const [bulkText, setBulkText] = useState('');
      const [bulkGender, setBulkGender] = useState('Male');
      const [importClassId, setImportClassId] = useState('');

      const handleAddSingle = () => {
        if (!singleName.trim()) return;
        setRoster([...roster, { id: 's' + Date.now(), name: singleName.trim(), gender: singleGender }]);
        setSingleName('');
      };

      const handleAddBulk = () => {
        const lines = bulkText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        if (lines.length === 0) return;

        const newStudents = lines.map((name, idx) => ({
          id: 's' + Date.now() + idx,
          name,
          gender: bulkGender
        }));

        setRoster([...roster, ...newStudents]);
        setBulkText('');
      };

      const handleRemoveStudent = (id) => {
        setRoster(roster.filter(s => s.id !== id));
      };

      const handleImport = () => {
        const selectedClass = classes.find(c => c.id === importClassId);
        if (!selectedClass) return;

        const newStudents = selectedClass.students.map((s, idx) => ({
          id: 's' + Date.now() + idx,
          name: s.name,
          gender: s.gender
        }));

        const existingNames = new Set(roster.map(r => r.name.toLowerCase()));
        const filteredNew = newStudents.filter(s => !existingNames.has(s.name.toLowerCase()));

        setRoster([...roster, ...filteredNew]);
        setImportClassId('');
      };

      const handleSaveClass = async () => {
        if (!className.trim() || !subject.trim()) {
          setErrorMsg("Please enter both a class name and subject.");
          return;
        }

        const newClassId = 'c' + Date.now();
        const newClass = {
          id: newClassId,
          name: className.trim(),
          subject: subject.trim(),
          schoolYear: schoolYear.trim(),
          students: roster.sort((a,b) => a.name.localeCompare(b.name)),
          attendance: {},
          createdAt: new Date().toISOString()
        };

        try {
          // Immediately writes to offline cache and queues sync
          const classRef = doc(db, 'artifacts', appId, 'users', user.uid, 'classes', newClassId);
          await setDoc(classRef, newClass);
          onGoBack(); // Return to dashboard instantly, data syncs in background
        } catch(e) {
          setErrorMsg("Failed to save class. " + e.message);
        }
      };

      return (
        <div className="space-y-4 sm:space-y-6 animate-in fade-in">
          <div className="flex items-center gap-3 sm:gap-4 mb-2">
            <button onClick={onGoBack} className="p-2 sm:p-2.5 hover:bg-slate-200 rounded-full transition-colors bg-white shadow-sm border border-slate-200">
              <ChevronLeft className="w-5 h-5 sm:w-6 sm:h-6 text-slate-600" />
            </button>
            <h2 className="text-xl sm:text-2xl font-bold text-slate-800">Create New Class</h2>
          </div>

          {errorMsg && (
            <div className="bg-red-50 text-red-700 p-4 rounded-xl flex items-center gap-3 border border-red-200">
              <AlertCircle className="w-5 h-5 shrink-0" />
              <p className="font-medium text-sm">{errorMsg}</p>
            </div>
          )}

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            {/* LEFT COLUMN: Forms */}
            <div className="lg:col-span-7 space-y-6">
              {/* Form 1: Details */}
              <div className="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 className="font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3 flex items-center gap-2">
                  <span className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center text-sm">1</span> 
                  Class Details
                </h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div className="sm:col-span-2">
                    <label className="block text-sm font-semibold text-slate-700 mb-1.5">Section Name</label>
                    <input type="text" value={className} onChange={e => setClassName(e.target.value)} placeholder="e.g. Grade 10 - Rizal" className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" />
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-slate-700 mb-1.5">Subject</label>
                    <input type="text" value={subject} onChange={e => setSubject(e.target.value)} placeholder="e.g. Mathematics" className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" />
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-slate-700 mb-1.5">School Year</label>
                    <input type="text" value={schoolYear} onChange={e => setSchoolYear(e.target.value)} className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" />
                  </div>
                </div>
              </div>

              {/* Form 2: Add Students */}
              <div className="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-200">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4 border-b border-slate-100 pb-3">
                  <h3 className="font-bold text-slate-800 flex items-center gap-2">
                    <span className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center text-sm">2</span> 
                    Add Students
                  </h3>
                  <div className="flex flex-wrap bg-slate-100 p-1 rounded-lg w-full sm:w-auto">
                    <button onClick={() => setAddMode('single')} className={`flex-1 sm:flex-none px-3 py-1.5 text-sm rounded font-medium transition-colors ${addMode === 'single' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-600 hover:text-slate-800'}`}>Single</button>
                    <button onClick={() => setAddMode('bulk')} className={`flex-1 sm:flex-none px-3 py-1.5 text-sm rounded font-medium transition-colors ${addMode === 'bulk' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-600 hover:text-slate-800'}`}>Bulk</button>
                    {classes.length > 0 && (
                      <button onClick={() => setAddMode('import')} className={`flex-1 sm:flex-none px-3 py-1.5 text-sm rounded font-medium transition-colors ${addMode === 'import' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-600 hover:text-slate-800'}`}>Import</button>
                    )}
                  </div>
                </div>

                {addMode === 'single' && (
                  <div className="space-y-3">
                    <input type="text" value={singleName} onChange={e => setSingleName(e.target.value)} placeholder="Last Name, First Name" className="w-full p-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" />
                    <div className="flex flex-col sm:flex-row gap-3">
                      <select value={singleGender} onChange={e => setSingleGender(e.target.value)} className="flex-1 p-3 border border-slate-300 rounded-xl outline-none bg-white focus:ring-2 focus:ring-blue-500 cursor-pointer">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                      </select>
                      <button onClick={handleAddSingle} className="w-full sm:w-auto bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-sm">Add Student</button>
                    </div>
                  </div>
                )}
                
                {addMode === 'bulk' && (
                  <div className="space-y-3">
                    <p className="text-sm text-slate-500">Paste student names below (one per line). All will be assigned the selected gender.</p>
                    <textarea value={bulkText} onChange={e => setBulkText(e.target.value)} placeholder="Dela Cruz, Juan&#10;Santos, Mark" className="w-full p-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 h-32 resize-none custom-scrollbar" />
                    <div className="flex flex-col sm:flex-row gap-3">
                      <select value={bulkGender} onChange={e => setBulkGender(e.target.value)} className="flex-1 p-3 border border-slate-300 rounded-xl outline-none bg-white font-medium cursor-pointer">
                        <option value="Male">Assign as Male</option>
                        <option value="Female">Assign as Female</option>
                      </select>
                      <button onClick={handleAddBulk} className="w-full sm:w-auto bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-sm flex items-center justify-center gap-2">
                        <ListPlus className="w-5 h-5" /> Add All
                      </button>
                    </div>
                  </div>
                )}

                {addMode === 'import' && (
                  <div className="space-y-3">
                    <p className="text-sm text-slate-500">Select an existing class from the system to copy its student roster.</p>
                    <select 
                      value={importClassId} 
                      onChange={e => setImportClassId(e.target.value)}
                      className="w-full p-3 border border-slate-300 rounded-xl outline-none bg-white cursor-pointer"
                    >
                      <option value="">-- Choose a Class --</option>
                      {classes.map(c => (
                        <option key={c.id} value={c.id}>
                          {c.name} ({c.subject}) - SY: {c.schoolYear} - {c.students.length} students
                        </option>
                      ))}
                    </select>
                    <button 
                      onClick={handleImport} 
                      disabled={!importClassId}
                      className="w-full bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed transition-colors shadow-sm flex justify-center items-center gap-2"
                    >
                      <Copy className="w-5 h-5" /> Import Roster
                    </button>
                  </div>
                )}
              </div>
            </div>

            {/* RIGHT COLUMN: Roster Preview */}
            <div className="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[500px] lg:h-auto overflow-hidden">
              <div className="p-4 sm:p-5 border-b border-slate-200 bg-slate-50 shrink-0">
                <h3 className="font-bold text-slate-800 flex items-center justify-between">
                  <span>Class Roster Preview</span>
                  <span className="bg-blue-100 text-blue-700 px-2.5 py-0.5 rounded-full text-xs">{roster.length}</span>
                </h3>
              </div>
              
              <div className="flex-1 overflow-y-auto p-4 bg-slate-50/50 custom-scrollbar">
                {roster.length === 0 ? (
                  <div className="h-full flex flex-col items-center justify-center text-slate-400 py-12">
                    <Users className="w-12 h-12 mb-3 text-slate-300" />
                    <p>No students added yet.</p>
                  </div>
                ) : (
                  <ul className="space-y-2.5">
                    {roster.map((student, i) => (
                      <li key={student.id} className="flex justify-between items-center bg-white p-3.5 rounded-xl border border-slate-200 shadow-sm group hover:border-blue-200 transition-colors">
                        <div className="min-w-0 flex-1 pr-2">
                          <span className="font-semibold text-slate-800 text-sm truncate block">{i + 1}. {student.name}</span>
                          <span className={`inline-block mt-1 text-xs px-2 py-0.5 rounded-md font-medium ${student.gender === 'Male' ? 'bg-blue-50 text-blue-600' : 'bg-pink-50 text-pink-600'}`}>
                            {student.gender}
                          </span>
                        </div>
                        <button onClick={() => handleRemoveStudent(student.id)} className="text-slate-300 hover:text-red-500 p-2 rounded-lg hover:bg-red-50 transition-colors shrink-0">
                          <XCircle className="w-5 h-5" />
                        </button>
                      </li>
                    ))}
                  </ul>
                )}
              </div>

              <div className="p-4 sm:p-5 border-t border-slate-200 bg-white shrink-0">
                <button onClick={handleSaveClass} className="w-full bg-green-600 hover:bg-green-700 active:bg-green-800 text-white font-bold py-3.5 rounded-xl flex justify-center items-center gap-2 transition-colors shadow-sm">
                  <Save className="w-5 h-5" /> Save Class to Cloud
                </button>
              </div>
            </div>
            
          </div>
        </div>
      );
    }

    function AttendanceRecordTab({ activeClass, user }) {
      const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
      const [tempAttendance, setTempAttendance] = useState({});
      const [isSaved, setIsSaved] = useState(true);

      useMemo(() => {
        const existing = activeClass.attendance?.[selectedDate] || {};
        const initialTemp = {};
        activeClass.students.forEach(s => {
          initialTemp[s.id] = existing[s.id] || 'Present'; // Default to present
        });
        setTempAttendance(initialTemp);
        setIsSaved(true);
      }, [selectedDate, activeClass]);

      const toggleStatus = (studentId, status) => {
        setTempAttendance(prev => ({ ...prev, [studentId]: status }));
        setIsSaved(false);
      };

      const saveAttendance = async () => {
        if (!user) return;
        
        try {
          const classRef = doc(db, 'artifacts', appId, 'users', user.uid, 'classes', activeClass.id);
          // Use dot notation to securely update just this specific date without touching others
          await updateDoc(classRef, {
            [`attendance.${selectedDate}`]: tempAttendance
          });
          setIsSaved(true);
        } catch(error) {
          console.error("Error saving attendance to cloud", error);
        }
      };

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col w-full">
          {/* Controls Header */}
          <div className="p-4 sm:p-5 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50">
            <div className="flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-3 w-full sm:w-auto">
              <label className="font-semibold text-slate-700 text-sm sm:text-base">Record Date:</label>
              <input 
                type="date" 
                value={selectedDate}
                onChange={(e) => setSelectedDate(e.target.value)}
                className="w-full sm:w-auto border-slate-300 rounded-xl p-2.5 sm:p-2 border focus:ring-2 focus:ring-blue-500 outline-none bg-white font-medium shadow-sm cursor-pointer"
              />
            </div>
            <button 
              onClick={saveAttendance}
              disabled={isSaved}
              className={`w-full sm:w-auto flex justify-center items-center gap-2 px-6 py-3 sm:py-2.5 rounded-xl font-bold transition-all ${isSaved ? 'bg-slate-100 text-slate-500 border border-slate-200 cursor-not-allowed' : 'bg-green-600 text-white hover:bg-green-700 shadow-md shadow-green-200'}`}
            >
              {isSaved ? <><Check className="w-5 h-5" /> Saved for Date</> : <><Save className="w-5 h-5" /> Sync to Cloud</>}
            </button>
          </div>

          {/* Responsive Table Container */}
          <div className="w-full overflow-x-auto custom-scrollbar">
            <table className="w-full text-left border-collapse min-w-[500px]">
              <thead>
                <tr className="bg-white text-slate-500 text-xs sm:text-sm uppercase tracking-wider border-b border-slate-200">
                  <th className="p-4 sm:px-6 font-bold w-full sm:w-auto">Student Name</th>
                  <th className="p-4 sm:px-6 font-bold text-center w-[200px] sm:w-[280px]">Attendance Status</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {activeClass.students.map((student, idx) => (
                  <tr key={student.id} className="hover:bg-blue-50/50 transition-colors group">
                    <td className="p-4 sm:px-6 font-semibold text-slate-800 text-sm sm:text-base whitespace-nowrap">
                      <span className="text-slate-400 mr-2 w-5 inline-block text-right">{idx + 1}.</span> {student.name}
                    </td>
                    <td className="p-3 sm:p-4">
                      <div className="flex items-center justify-center gap-2">
                        <button
                          onClick={() => toggleStatus(student.id, 'Present')}
                          className={`flex-1 flex justify-center items-center gap-1.5 px-2 sm:px-4 py-2 sm:py-2.5 rounded-lg sm:rounded-xl text-xs sm:text-sm font-bold transition-all border ${tempAttendance[student.id] === 'Present' ? 'bg-green-100 text-green-700 border-green-300 shadow-inner' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}
                        >
                          <CheckCircle2 className="w-4 h-4 sm:w-5 sm:h-5 shrink-0" /> <span className="hidden sm:inline">Present</span><span className="sm:hidden">P</span>
                        </button>
                        <button
                          onClick={() => toggleStatus(student.id, 'Absent')}
                          className={`flex-1 flex justify-center items-center gap-1.5 px-2 sm:px-4 py-2 sm:py-2.5 rounded-lg sm:rounded-xl text-xs sm:text-sm font-bold transition-all border ${tempAttendance[student.id] === 'Absent' ? 'bg-red-100 text-red-700 border-red-300 shadow-inner' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}
                        >
                          <XCircle className="w-4 h-4 sm:w-5 sm:h-5 shrink-0" /> <span className="hidden sm:inline">Absent</span><span className="sm:hidden">A</span>
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function MonthlyReportTab({ activeClass }) {
      const attendanceRecord = activeClass.attendance || {};
      const allRecordedDates = Object.keys(attendanceRecord).sort();
      const availableMonths = [...new Set(allRecordedDates.map(date => date.substring(0, 7)))];
      
      const [selectedMonth, setSelectedMonth] = useState(
        availableMonths.length > 0 ? availableMonths[availableMonths.length - 1] : new Date().toISOString().substring(0, 7)
      );

      const datesInSelectedMonth = allRecordedDates.filter(date => date.startsWith(selectedMonth));
      const totalSchoolDays = datesInSelectedMonth.length;

      const maleStudents = activeClass.students.filter(s => s.gender === 'Male');
      const femaleStudents = activeClass.students.filter(s => s.gender === 'Female');
      const otherStudents = activeClass.students.filter(s => s.gender !== 'Male' && s.gender !== 'Female');

      const getDayOnly = (dateStr) => dateStr.split('-')[2];

      // MATRIX ROW RENDERER
      const renderStudentRow = (student, index) => {
        let presentTotal = 0;
        let absentTotal = 0;

        const cells = datesInSelectedMonth.map(date => {
          const status = attendanceRecord[date]?.[student.id];
          if (status === 'Present') presentTotal++;
          if (status === 'Absent') absentTotal++;

          return (
            <td key={date} className="p-2 border border-slate-200 text-center min-w-[40px] text-sm">
              {status === 'Present' && <span className="text-green-600 font-bold">P</span>}
              {status === 'Absent' && <span className="text-red-500 font-bold">A</span>}
              {!status && <span className="text-slate-300">-</span>}
            </td>
          );
        });

        return (
          <tr key={student.id} className="hover:bg-blue-50/50 transition-colors">
            {/* STICKY COLUMN */}
            <td className="p-2 sm:p-3 border border-slate-200 sticky left-0 bg-white z-10 text-xs sm:text-sm font-semibold text-slate-800 whitespace-nowrap shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] truncate max-w-[150px] sm:max-w-[250px]">
              {index + 1}. {student.name}
            </td>
            {cells}
            <td className="p-2 border border-slate-200 text-center font-bold text-green-700 bg-green-50/80">{presentTotal}</td>
            <td className="p-2 border border-slate-200 text-center font-bold text-red-600 bg-red-50/80">{absentTotal}</td>
          </tr>
        );
      };

      // Calculate Statistics for Summary Table
      const calculateStats = (studentsList) => {
        let presentCount = 0;
        let absentCount = 0;

        studentsList.forEach(student => {
          datesInSelectedMonth.forEach(date => {
            const status = attendanceRecord[date]?.[student.id];
            if (status === 'Present') presentCount++;
            if (status === 'Absent') absentCount++;
          });
        });

        const possibleDays = studentsList.length * totalSchoolDays;
        
        const ada = totalSchoolDays > 0 ? (presentCount / totalSchoolDays) : 0;
        const pda = possibleDays > 0 ? (presentCount / possibleDays) * 100 : 0;

        return {
          enrollment: studentsList.length,
          present: presentCount,
          absent: absentCount,
          ada: ada.toFixed(2),
          pda: pda.toFixed(2)
        };
      };

      const maleStats = calculateStats(maleStudents);
      const femaleStats = calculateStats(femaleStudents);
      const totalStats = calculateStats(activeClass.students);

      return (
        <div className="space-y-6 w-full">
          {/* MATRIX TABLE SECTION */}
          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col w-full">
            <div className="p-4 sm:p-5 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50">
              <div className="flex items-center gap-2">
                <BarChart4 className="w-5 h-5 sm:w-6 sm:h-6 text-blue-600 shrink-0" />
                <h2 className="text-base sm:text-lg font-bold text-slate-800">Monthly Attendance Matrix</h2>
              </div>
              <div className="flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-3 w-full sm:w-auto">
                <label className="font-semibold text-slate-700 text-sm whitespace-nowrap">Select Month:</label>
                <input 
                  type="month" 
                  value={selectedMonth}
                  onChange={(e) => setSelectedMonth(e.target.value)}
                  className="w-full sm:w-auto border-slate-300 rounded-xl p-2.5 sm:p-2 border focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white shadow-sm cursor-pointer"
                />
              </div>
            </div>

            <div className="p-0 sm:p-5">
              {datesInSelectedMonth.length === 0 ? (
                <div className="flex flex-col items-center justify-center py-12 sm:py-16 text-slate-500 bg-slate-50 m-4 sm:m-0 rounded-2xl border border-dashed border-slate-300">
                  <AlertCircle className="w-10 h-10 sm:w-12 sm:h-12 text-slate-300 mb-3" />
                  <p className="text-base sm:text-lg font-bold text-slate-700">No records found</p>
                  <p className="text-xs sm:text-sm text-center px-4 mt-1">There is no recorded attendance for {selectedMonth}.</p>
                </div>
              ) : (
                <div className="w-full overflow-x-auto custom-scrollbar sm:rounded-xl sm:border border-slate-200">
                  <table className="w-full text-left border-collapse min-w-max">
                    <thead>
                      <tr className="bg-slate-800 text-white text-xs sm:text-sm uppercase tracking-wider">
                        {/* STICKY HEADER */}
                        <th className="p-3 border border-slate-700 sticky left-0 z-20 bg-slate-800 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.5)] whitespace-nowrap">
                          Student Name
                        </th>
                        {datesInSelectedMonth.map(date => (
                          <th key={date} className="p-2 border border-slate-700 text-center font-medium min-w-[40px]">
                            {getDayOnly(date)}
                          </th>
                        ))}
                        <th className="p-2 sm:p-3 border border-slate-700 text-center bg-slate-700 min-w-[60px]">Pre</th>
                        <th className="p-2 sm:p-3 border border-slate-700 text-center bg-slate-700 min-w-[60px]">Abs</th>
                      </tr>
                    </thead>
                    <tbody>
                      {maleStudents.length > 0 && (
                        <>
                          <tr>
                            <td colSpan={datesInSelectedMonth.length + 3} className="bg-blue-100/80 p-2 px-3 font-bold text-blue-900 sticky left-0 z-10 text-xs sm:text-sm border-b border-blue-200 uppercase tracking-wide">
                              MALE ({maleStudents.length})
                            </td>
                          </tr>
                          {maleStudents.map((student, index) => renderStudentRow(student, index))}
                        </>
                      )}

                      {femaleStudents.length > 0 && (
                        <>
                          <tr>
                            <td colSpan={datesInSelectedMonth.length + 3} className="bg-pink-100/80 p-2 px-3 font-bold text-pink-900 sticky left-0 z-10 text-xs sm:text-sm border-b border-pink-200 uppercase tracking-wide">
                              FEMALE ({femaleStudents.length})
                            </td>
                          </tr>
                          {femaleStudents.map((student, index) => renderStudentRow(student, index))}
                        </>
                      )}

                      {otherStudents.length > 0 && (
                        <>
                          <tr>
                            <td colSpan={datesInSelectedMonth.length + 3} className="bg-slate-200 p-2 px-3 font-bold text-slate-700 sticky left-0 z-10 text-xs sm:text-sm border-b border-slate-300 uppercase tracking-wide">
                              UNSPECIFIED
                            </td>
                          </tr>
                          {otherStudents.map((student, index) => renderStudentRow(student, index))}
                        </>
                      )}
                    </tbody>
                  </table>
                </div>
              )}
              
              {datesInSelectedMonth.length > 0 && (
                <div className="mt-4 mx-4 sm:mx-0 flex flex-wrap gap-4 sm:gap-6 text-xs sm:text-sm text-slate-600 bg-slate-50 p-3 sm:p-4 rounded-xl border border-slate-200 w-fit">
                  <span className="flex items-center gap-2"><span className="w-6 h-6 flex items-center justify-center bg-green-100 text-green-700 font-bold rounded-md border border-green-200">P</span> Present</span>
                  <span className="flex items-center gap-2"><span className="w-6 h-6 flex items-center justify-center bg-red-100 text-red-700 font-bold rounded-md border border-red-200">A</span> Absent</span>
                  <span className="flex items-center gap-2"><span className="w-6 h-6 flex items-center justify-center bg-slate-200 text-slate-500 font-bold rounded-md border border-slate-300">-</span> No Record</span>
                </div>
              )}
            </div>
          </div>

          {/* SUMMARY STATISTICS TABLE SECTION */}
          {datesInSelectedMonth.length > 0 && (
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden w-full">
              <div className="p-4 sm:p-5 border-b border-slate-200 bg-slate-50 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                <div className="flex items-center gap-2">
                  <Percent className="w-5 h-5 text-indigo-600 shrink-0" />
                  <h3 className="text-base sm:text-lg font-bold text-slate-800">Monthly Statistics</h3>
                </div>
                <span className="text-sm font-medium text-slate-600 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm w-fit">
                  Total School Days: <strong className="text-slate-900">{totalSchoolDays}</strong>
                </span>
              </div>
              
              <div className="w-full overflow-x-auto custom-scrollbar">
                <table className="w-full text-left border-collapse min-w-[700px]">
                  <thead>
                    <tr className="bg-white text-slate-500 text-xs sm:text-sm uppercase tracking-wider border-b border-slate-200">
                      <th className="p-3 sm:p-4 font-bold">Category</th>
                      <th className="p-3 sm:p-4 font-bold text-center">Enrollment</th>
                      <th className="p-3 sm:p-4 font-bold text-center text-green-700">Total Present</th>
                      <th className="p-3 sm:p-4 font-bold text-center text-red-700">Total Absent</th>
                      <th className="p-3 sm:p-4 font-bold text-center text-indigo-700 whitespace-nowrap" title="Average Daily Attendance = Total Present / School Days">
                        ADA <span className="font-normal text-xs normal-case text-slate-400 hidden sm:inline ml-1">(Avg Daily Att.)</span>
                      </th>
                      <th className="p-3 sm:p-4 font-bold text-center text-blue-700 whitespace-nowrap" title="Percentage of Daily Attendance = (Total Present / Possible Days) * 100">
                        PDA <span className="font-normal text-xs normal-case text-slate-400 hidden sm:inline ml-1">(%)</span>
                      </th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100 text-sm sm:text-base">
                    <tr className="hover:bg-blue-50/50 transition-colors">
                      <td className="p-3 sm:p-4 font-bold text-slate-700">Male</td>
                      <td className="p-3 sm:p-4 text-center font-medium">{maleStats.enrollment}</td>
                      <td className="p-3 sm:p-4 text-center text-green-600 font-semibold">{maleStats.present}</td>
                      <td className="p-3 sm:p-4 text-center text-red-500 font-semibold">{maleStats.absent}</td>
                      <td className="p-3 sm:p-4 text-center text-indigo-600 font-bold">{maleStats.ada}</td>
                      <td className="p-3 sm:p-4 text-center text-blue-600 font-bold">{maleStats.pda}%</td>
                    </tr>
                    <tr className="hover:bg-pink-50/50 transition-colors">
                      <td className="p-3 sm:p-4 font-bold text-slate-700">Female</td>
                      <td className="p-3 sm:p-4 text-center font-medium">{femaleStats.enrollment}</td>
                      <td className="p-3 sm:p-4 text-center text-green-600 font-semibold">{femaleStats.present}</td>
                      <td className="p-3 sm:p-4 text-center text-red-500 font-semibold">{femaleStats.absent}</td>
                      <td className="p-3 sm:p-4 text-center text-indigo-600 font-bold">{femaleStats.ada}</td>
                      <td className="p-3 sm:p-4 text-center text-blue-600 font-bold">{femaleStats.pda}%</td>
                    </tr>
                  </tbody>
                  <tfoot className="bg-slate-100/80 border-t-2 border-slate-300 text-sm sm:text-base">
                    <tr>
                      <td className="p-3 sm:p-4 font-black text-slate-900 uppercase">Total</td>
                      <td className="p-3 sm:p-4 text-center font-black text-slate-900">{totalStats.enrollment}</td>
                      <td className="p-3 sm:p-4 text-center font-black text-green-700">{totalStats.present}</td>
                      <td className="p-3 sm:p-4 text-center font-black text-red-600">{totalStats.absent}</td>
                      <td className="p-3 sm:p-4 text-center font-black text-indigo-700 bg-indigo-50/50">{totalStats.ada}</td>
                      <td className="p-3 sm:p-4 text-center font-black text-blue-700 bg-blue-50/50">{totalStats.pda}%</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Initialize the app
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
